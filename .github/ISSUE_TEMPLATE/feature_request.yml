name: Feature Request
description: Suggest an idea or enhancement for TaskFlow
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 💡 Feature Request — TaskFlow

        Thanks for suggesting an improvement! Help us understand your idea by providing a clear and detailed description.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched [existing issues](https://github.com/sanot-tech/TaskFlow/issues) and this is not a duplicate
          required: true
        - label: I have checked the [roadmap](https://github.com/sanot-tech/TaskFlow/projects) and this feature is not already planned
          required: true
        - label: I have reviewed the [documentation](https://github.com/sanot-tech/TaskFlow#readme) for existing solutions
          required: true

  - type: markdown
    attributes:
      value: |
        ---
        ### 📋 Feature Details

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What area does this feature relate to?
      options:
        - Core Functionality
        - User Experience
        - Performance
        - Accessibility
        - Developer Experience
        - Documentation
        - Security
        - Mobile / PWA
        - Integrations
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Proposed Priority
      description: How important is this feature to you?
      options:
        - 🟢 Low — Nice-to-have enhancement
        - 🟡 Medium — Would significantly improve workflow
        - 🔴 High — Critical gap affecting daily use
        - ⚫ Urgent — Blocking functionality
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Describe it clearly
      placeholder: "I'm always frustrated when I have to manually sort tasks by priority every time I open the app. There is no way to persist sort preferences across sessions..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like in detail. Include mockups or diagrams if available
      placeholder: "I would like a 'Save sort preference' option in the settings, so my chosen sort order persists between sessions. The setting should sync across devices if the user is logged in."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or workarounds you've considered
      placeholder: "I tried using browser bookmarks with query parameters, but that doesn't work on mobile. I also considered using the API directly to pre-sort results, but that's not user-friendly."

  - type: textarea
    id: impact
    attributes:
      label: Expected Impact
      description: How would this feature benefit users or the project?
      placeholder: "This would save active users approximately 30 seconds per session. For users managing 10+ tasks daily, this adds up to significant time savings and reduces friction."

  - type: markdown
    attributes:
      value: |
        ---
        ### 📎 Additional Information

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add mockups, screenshots, reference implementations, or any other supporting information
      placeholder: "I've attached a mockup of how the settings panel could look. The Notion app has a similar feature that works well."
