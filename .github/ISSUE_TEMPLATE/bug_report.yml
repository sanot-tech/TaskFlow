name: Bug Report
description: Report a reproducible bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 Bug Report
        Thanks for taking the time to fill out this report. Please provide as much detail as possible to help us resolve the issue quickly.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Before submitting, please confirm
      options:
        - label: I have searched existing [issues](https://github.com/Biopasks/todo-list/issues) and this is not a duplicate
          required: true
        - label: I am running the latest version
          required: true
        - label: I have checked the [documentation](https://github.com/Biopasks/todo-list#readme) for existing solutions
          required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: "When I click X, Y happens instead of Z..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Exact steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll to '...'
        4. See error
      render: bash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: "I expected X to happen instead of Y"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include screenshots if applicable
      placeholder: "X happened, which is incorrect because..."
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please complete the following information
      value: |
        - OS: [e.g., macOS 14.5, Windows 11, Ubuntu 24.04]
        - Browser: [e.g., Chrome 125, Firefox 127, Safari 17.5]
        - Version: [e.g., v2.0.0]
        - Node Version: [e.g., 20.15.0]
        - Package Manager: [e.g., pnpm 9.4.0]
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Copy and paste any relevant log output (will be auto-formatted)
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (e.g., related issues, possible fixes)
