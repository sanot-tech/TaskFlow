# Dependabot — Automated Dependency Management
# Docs: https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  # npm / pnpm / yarn
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'UTC'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
      - 'automated'
    assignees:
      - 'sanot-tech'
    groups:
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      eslint:
        patterns:
          - 'eslint*'
          - '@eslint/*'
      typescript:
        patterns:
          - 'typescript'
          - '@types/*'
    ignore:
      - dependency-name: 'react'
        versions: ['>=20.x']
      - dependency-name: 'typescript'
        versions: ['>=6.x']
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'UTC'
    open-pull-requests-limit: 5
    labels:
      - 'ci'
      - 'automated'
    commit-message:
      prefix: 'chore(ci)'
